<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>YT Summary AI — Sažetak</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f13;
      color: #e4e4e7;
      line-height: 1.7;
      min-height: 100vh;
    }

    .hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 2.5rem 0 2rem;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 100px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .badge svg { width: 14px; height: 14px; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f4f4f5;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.82rem;
      color: #71717a;
      margin-top: 0.75rem;
    }
    .meta span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .meta svg { width: 14px; height: 14px; opacity: 0.6; }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.25rem;
    }
    .toolbar button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.06);
      color: #a1a1aa;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toolbar button:hover {
      background: rgba(255,255,255,0.1);
      color: #e4e4e7;
      border-color: rgba(255,255,255,0.15);
    }
    .toolbar button.copied {
      background: rgba(52, 211, 153, 0.1);
      color: #34d399;
      border-color: rgba(52, 211, 153, 0.2);
    }
    .toolbar button svg { width: 14px; height: 14px; }

    .content {
      padding: 2.5rem 0 4rem;
    }

    .summary {
      font-size: 0.95rem;
      color: #d4d4d8;
      line-height: 1.8;
    }

    .summary h1, .summary h2, .summary h3 {
      color: #f4f4f5;
      margin-top: 1.8rem;
      margin-bottom: 0.6rem;
    }
    .summary h1 { font-size: 1.4rem; }
    .summary h2 { font-size: 1.2rem; }
    .summary h3 { font-size: 1.05rem; }
    .summary h1:first-child, .summary h2:first-child, .summary h3:first-child {
      margin-top: 0;
    }

    .summary p {
      margin-bottom: 1rem;
    }

    .summary ul, .summary ol {
      margin: 0.5rem 0 1rem 1.5rem;
    }
    .summary li {
      margin-bottom: 0.4rem;
    }
    .summary li::marker {
      color: #6366f1;
    }

    .summary strong {
      color: #f4f4f5;
      font-weight: 600;
    }

    .summary em {
      color: #a78bfa;
      font-style: italic;
    }

    .summary blockquote {
      border-left: 3px solid #6366f1;
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      background: rgba(99, 102, 241, 0.05);
      border-radius: 0 8px 8px 0;
      color: #a1a1aa;
    }

    .summary code {
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      color: #c084fc;
    }

    .summary hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 1.5rem 0;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 40vh;
      gap: 1rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(99,102,241,0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #71717a; font-size: 0.85rem; }

    .info-card {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      font-size: 0.82rem;
      display: none;
    }

    .sponsor-card {
      background: rgba(52, 211, 153, 0.05);
      border: 1px solid rgba(52, 211, 153, 0.1);
      color: #34d399;
    }
    .sponsor-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0.75rem;
    }
    .sponsor-header svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sponsor-header strong { color: #5eead4; }
    .sponsor-categories {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .sponsor-cat {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(52, 211, 153, 0.08);
      border: 1px solid rgba(52, 211, 153, 0.12);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
    }
    .cat-icon { font-size: 0.9rem; }
    .cat-label { color: #a7f3d0; }
    .cat-dur { color: #5eead4; font-weight: 600; }

    .usage-card {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.1);
      color: #a5b4fc;
    }
    .usage-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0.75rem;
      font-weight: 500;
      color: #818cf8;
    }
    .usage-header svg { width: 16px; height: 16px; flex-shrink: 0; }
    .usage-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }
    .usage-item {
      background: rgba(99, 102, 241, 0.06);
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }
    .usage-label {
      display: block;
      font-size: 0.7rem;
      color: #818cf8;
      margin-bottom: 2px;
    }
    .usage-value {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #c7d2fe;
    }
    .usage-cost { color: #34d399; }
    .usage-note {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: #6366f1;
      opacity: 0.7;
    }

    /* Detail buttons */
    .detail-buttons {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .detail-label {
      font-size: 0.8rem;
      color: #71717a;
      margin-right: 0.5rem;
    }
    .detail-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #a1a1aa;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .detail-btn:hover {
      background: rgba(255,255,255,0.08);
      color: #e4e4e7;
    }
    .detail-btn.active {
      background: rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.3);
      color: #a5b4fc;
      font-weight: 500;
    }
    .detail-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Chat Section */
    .chat-section {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .chat-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #f4f4f5;
      margin-bottom: 1.5rem;
    }
    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
      max-height: 500px;
      overflow-y: auto;
      padding-right: 10px;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    
    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .message-user {
      align-self: flex-end;
      background: #312e81;
      color: #e0e7ff;
      border-bottom-right-radius: 2px;
    }
    .message-model {
      align-self: flex-start;
      background: rgba(255,255,255,0.05);
      color: #d4d4d8;
      border-bottom-left-radius: 2px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .chat-input-area {
      display: flex;
      gap: 0.75rem;
      background: rgba(255,255,255,0.03);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .chat-input-area textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: #e4e4e7;
      font-family: inherit;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      padding: 4px;
    }
    .chat-send-btn {
      align-self: flex-end;
      background: #4f46e5;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .chat-send-btn:hover { background: #4338ca; }
    .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Učitavam sažetak...</div>
  </div>

  <div id="page" style="display:none;">
    <div class="hero">
      <div class="container">
        <div class="badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          AI Sažetak
        </div>
        <h1 id="video-title">Video sažetak</h1>
        <div class="meta">
          <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="meta-date"></span>
          </span>
          <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            <span id="meta-words"></span>
          </span>
        </div>
        <div class="toolbar">
          <button id="copy-md-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Kopiraj Markdown
          </button>
          <button id="copy-text-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
            Kopiraj tekst
          </button>
        </div>

        <div class="detail-buttons">
          <span class="detail-label">Detaljnost:</span>
          <button id="detail-short" class="detail-btn" data-level="1">Kratko</button>
          <button id="detail-medium" class="detail-btn active" data-level="2">Srednje</button>
          <button id="detail-detailed" class="detail-btn" data-level="3">Detaljno</button>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="container">
        <div id="summary" class="summary"></div>
        <div id="sponsor-info" class="info-card sponsor-card"></div>
        <div id="usage-info" class="info-card usage-card"></div>

        <div class="chat-section">
          <h2 class="chat-title">Pitaj AI o videu</h2>
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-area">
            <textarea id="chat-input" placeholder="Postavi pitanje o videu..." rows="2"></textarea>
            <button id="chat-send-btn" class="chat-send-btn">Pošalji</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="gemini.js"></script>
  <script src="result.js"></script>
</body>
</html>
