<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h2>YT Summary AI <small id="plugin-version"></small></h2>
    </header>

    <div id="setup-view" class="view hidden">
      <div class="options" style="margin-bottom: 10px;">
        <label>LLM Provider:</label>
        <select id="llm-provider">
          <option value="gemini" selected>Gemini</option>
          <option value="deepseek">DeepSeek</option>
          <option value="ollama">Ollama (Local)</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <div id="gemini-model-wrapper" class="options" style="margin-bottom: 10px;">
        <label>Verzija modela:</label>
        <select id="gemini-model-select">
          <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
          <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
        </select>
      </div>

      <div style="margin-bottom: 5px;">API URL:</div>
      <input type="text" id="api-url-input" placeholder="https://generativelanguage.googleapis.com...">
      <div style="margin-bottom: 5px;">Model:</div>
      <input type="text" id="api-model-input" placeholder="gemini-3-flash-preview">
      <div style="margin-bottom: 5px;">API Ključ:</div>
      <input type="password" id="api-key-input" placeholder="Unesite ključ (opciono za lokalne)">

      <div id="advanced-settings-wrapper" style="margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px;">
        <div style="font-size: 12px; font-weight: bold; margin-bottom: 8px;">Napredna podešavanja (Local/Custom):</div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 8px;">
          <div style="flex: 1;">
            <div style="font-size: 11px; margin-bottom: 3px;">Context (tokens):</div>
            <input type="number" id="context-window-input" placeholder="32768" style="width: 100%; box-sizing: border-box; padding: 5px;">
          </div>
          <div style="flex: 1;">
            <div style="font-size: 11px; margin-bottom: 3px;">Temperature:</div>
            <input type="number" id="temperature-input" placeholder="0.7" step="0.1" min="0" max="2" style="width: 100%; box-sizing: border-box; padding: 5px;">
          </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 8px;">
          <div style="flex: 1;">
            <div style="font-size: 11px; margin-bottom: 3px;">Top P:</div>
            <input type="number" id="top-p-input" placeholder="1.0" step="0.1" min="0" max="1" style="width: 100%; box-sizing: border-box; padding: 5px;">
          </div>
          <div style="flex: 1;">
            <!-- Prazno za balans -->
          </div>
        </div>
      </div>
      
      <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button id="save-key-btn" style="flex: 1;">Sačuvaj</button>
        <button id="cancel-btn" class="secondary" style="flex: 1; margin-top: 0;">Zatvori</button>
      </div>
      
      <div class="dashboard" style="margin-top: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px;">
        <h4 style="margin: 0 0 10px 0; font-size: 13px;">Nadzorna tabla (Potrošnja)</h4>
        <div style="font-size: 12px; margin-bottom: 5px;">Ukupno tokena: <strong id="dash-tokens">0</strong></div>
        <div style="font-size: 12px; margin-bottom: 10px;">Procenjen trošak: <strong id="dash-cost">$0.00</strong></div>
        <button id="reset-stats-btn" class="secondary" style="font-size: 11px; padding: 4px 8px;">Resetuj statistiku</button>
      </div>
    </div>

    <div id="main-view" class="view">
      <div class="options">
        <label>Detaljnost:</label>
        <select id="detail-level">
          <option value="1">Kratko</option>
          <option value="2" selected>Srednje</option>
          <option value="3">Detaljno</option>
        </select>
      </div>
      <div class="options">
        <label>Persona:</label>
        <select id="persona-level">
          <option value="standard" selected>Standardno</option>
          <option value="skeptic">Analitičar / Skeptik</option>
          <option value="educator">Edukator / Profesor</option>
          <option value="journalist">Novinar / Izveštač</option>
        </select>
      </div>

      <button id="summarize-btn">Generiši sažetak</button>
      
      <div id="status" class="status-msg"></div>

      <div id="debug-area" class="hidden">
        <hr>
        <p class="debug-info-label">DEBUG INFO:</p>
        <textarea id="debug-log" class="debug-log-area" readonly></textarea>
      </div>
      
      <button id="settings-btn" class="secondary">Podešavanja</button>
      <button id="debug-btn" class="debug-toggle">Prikaži Debug</button>
    </div>
  </div>
  <script src="gemini.js"></script>
  <script src="transcript-fetcher.js"></script>
  <script src="transcript-pipeline.js"></script>
  <script src="popup.js"></script>
</body>
</html>
