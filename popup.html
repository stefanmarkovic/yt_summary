<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h2><span data-i18n="app_title">YT Summary AI</span> <small id="plugin-version"></small></h2>
    </header>

    <div id="setup-view" class="view hidden">
      <div class="options" style="margin-bottom: 10px;">
        <label data-i18n="llm_provider">LLM Provider:</label>
        <select id="llm-provider">
          <option value="gemini" selected>Gemini</option>
          <option value="deepseek">DeepSeek</option>
          <option value="ollama">Ollama (Local)</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <div id="gemini-model-wrapper" class="options" style="margin-bottom: 10px;">
        <label data-i18n="model_version">Model version:</label>
        <select id="gemini-model-select">
          <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
          <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
        </select>
      </div>

      <div style="margin-bottom: 5px;" data-i18n="api_url">API URL:</div>
      <input type="text" id="api-url-input" data-i18n="api_url_placeholder" placeholder="https://generativelanguage.googleapis.com...">
      <div style="margin-bottom: 5px;" data-i18n="api_model">Model:</div>
      <input type="text" id="api-model-input" data-i18n="api_model_placeholder" placeholder="gemini-3-flash-preview">
      <div style="margin-bottom: 5px;" data-i18n="api_key">API Key:</div>
      <input type="password" id="api-key-input" data-i18n="api_key_placeholder" placeholder="Enter key (optional for local)">

      <div id="advanced-settings-wrapper" style="margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px;">
        <div data-i18n="advanced_settings" style="font-size: 12px; font-weight: bold; margin-bottom: 8px;">Advanced settings (Local/Custom):</div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 8px;">
          <div style="flex: 1;">
            <div style="font-size: 11px; margin-bottom: 3px;">Context (tokens):</div>
            <input type="number" id="context-window-input" placeholder="32768" style="width: 100%; box-sizing: border-box; padding: 5px;">
          </div>
          <div style="flex: 1;">
            <div style="font-size: 11px; margin-bottom: 3px;">Temperature:</div>
            <input type="number" id="temperature-input" placeholder="0.7" step="0.1" min="0" max="2" style="width: 100%; box-sizing: border-box; padding: 5px;">
          </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 8px;">
          <div style="flex: 1;">
            <div style="font-size: 11px; margin-bottom: 3px;">Top P:</div>
            <input type="number" id="top-p-input" placeholder="1.0" step="0.1" min="0" max="1" style="width: 100%; box-sizing: border-box; padding: 5px;">
          </div>
          <div style="flex: 1;">
            <!-- Balance -->
          </div>
        </div>
      </div>
      
      <div id="custom-prompt-wrapper" style="margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px;">
        <div data-i18n="custom_prompt_title" style="font-size: 12px; font-weight: bold; margin-bottom: 8px;">Custom Prompt Template:</div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
          <input type="text" id="custom-prompt-name" data-i18n="custom_prompt_name" placeholder="Template Name" style="width: 100%; box-sizing: border-box; padding: 5px;">
          <textarea id="custom-prompt-text" data-i18n="custom_prompt_text" placeholder="You are an expert..." style="width: 100%; box-sizing: border-box; padding: 5px; min-height: 60px; resize: vertical;"></textarea>
          <button id="add-custom-prompt-btn" class="secondary" style="font-size: 11px; padding: 4px 8px;" data-i18n="btn_add_prompt">Add Template</button>
        </div>
        <div id="custom-prompts-list" style="margin-top: 8px; font-size: 11px; display: flex; flex-direction: column; gap: 4px;"></div>
      </div>

      <div class="sticky-footer">
        <button id="save-key-btn" data-i18n="btn_save" style="flex: 1;">Save</button>
        <button id="cancel-btn" class="secondary" data-i18n="btn_close" style="flex: 1; margin-top: 0;">Close</button>
      </div>
      
      <div class="dashboard" style="margin-top: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px;">
        <h4 data-i18n="dashboard_title" style="margin: 0 0 10px 0; font-size: 13px;">Dashboard (Usage)</h4>
        <div style="font-size: 12px; margin-bottom: 5px;"><span data-i18n="total_tokens">Total tokens:</span> <strong id="dash-tokens">0</strong></div>
        <div style="font-size: 12px; margin-bottom: 10px;"><span data-i18n="est_cost">Estimated cost:</span> <strong id="dash-cost">$0.00</strong></div>
        <button id="reset-stats-btn" class="secondary" data-i18n="btn_reset" style="font-size: 11px; padding: 4px 8px;">Reset stats</button>
      </div>
    </div>

    <div id="main-view" class="view">
      <div class="options">
        <label data-i18n="ui_language">UI Language:</label>
        <select id="ui-language">
          <option value="en" selected>English</option>
          <option value="sr">Srpski</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
        </select>
      </div>
      <div class="options">
        <label data-i18n="output_language">Output Language:</label>
        <select id="output-language">
          <option value="English" selected>English</option>
          <option value="Srpski">Srpski</option>
          <option value="Deutsch">Deutsch</option>
          <option value="Español">Español</option>
        </select>
      </div>
      <div class="options">
        <label data-i18n="detail_level">Detail level:</label>
        <select id="detail-level">
          <option value="1" data-i18n="detail_short">Short</option>
          <option value="2" data-i18n="detail_medium" selected>Medium</option>
          <option value="3" data-i18n="detail_detailed">Detailed</option>
        </select>
      </div>
      <div class="options">
        <label data-i18n="persona_label">Persona:</label>
        <select id="persona-level">
          <option value="standard" data-i18n="persona_standard" selected>Standard</option>
          <option value="skeptic" data-i18n="persona_skeptic">Analyst / Skeptic</option>
          <option value="educator" data-i18n="persona_educator">Educator / Professor</option>
          <option value="journalist" data-i18n="persona_journalist">Journalist / Reporter</option>
        </select>
      </div>

      <button id="summarize-btn" data-i18n="btn_summarize">Generate summary</button>
      <button id="playlist-summarize-btn" class="hidden" style="background-color: #8b5cf6; margin-top: 5px;" data-i18n="btn_playlist">Summarize Playlist</button>
      
      <div id="status" class="status-msg"></div>

      <div id="debug-area" class="hidden">
        <hr>
        <p class="debug-info-label">DEBUG INFO:</p>
        <textarea id="debug-log" class="debug-log-area" readonly></textarea>
      </div>
      
      <button id="settings-btn" class="secondary" data-i18n="btn_settings">Settings</button>
      <button id="debug-btn" class="debug-toggle" data-i18n="btn_debug">Show Debug</button>
    </div>
  </div>
  <script src="i18n.js"></script>
  <script src="gemini.js"></script>
  <script src="transcript-fetcher.js"></script>
  <script src="transcript-pipeline.js"></script>
  <script src="popup.js"></script>
</body>
</html>
