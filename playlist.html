<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title data-i18n="batch_title">Playlist Batch Processing</title>
  <link rel="stylesheet" href="result.css">
</head>
<body>
  <div class="hero">
    <div class="container">
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <span data-i18n="batch_badge">Batch Processing</span>
      </div>
      <h1 id="batch-title" data-i18n="batch_title">Playlist Summary</h1>
      <div class="meta" id="batch-meta">
        <span id="progress-text">Initializing...</span>
      </div>
      <div style="margin-top: 15px;">
        <progress id="batch-progress" value="0" max="100" style="width: 100%; height: 10px;"></progress>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="container" id="batch-results">
      <!-- Individual summaries will be appended here -->
    </div>

    <!-- Collapsible Persistent Debug Log -->
    <div class="container">
      <div id="debug-section" class="info-card" style="display:none; margin-top:20px; padding:12px; border-radius:6px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05);">
        <details style="cursor:pointer; color:#aaa; font-size:12px;">
          <summary style="font-weight:bold; outline:none; user-select:none; margin-bottom:8px;" data-i18n="btn_debug">Show Debug Log</summary>
          <textarea id="result-debug-log" style="width:100%; height:180px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); color:#34d399; font-family:monospace; font-size:11px; padding:8px; box-sizing:border-box; border-radius:4px; resize:vertical; margin-top:5px; outline:none;" readonly></textarea>
        </details>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="prompts.js"></script>
  <script src="gemini.js"></script>
  <script src="transcript-fetcher.js"></script>
  <script src="transcript-pipeline.js"></script>
  <script src="markdown-renderer.js"></script>
  <script src="summary-renderer.js"></script>
  <script src="playlist.js"></script>
</body>
</html>
